version: '3.8'

services:
  # ============ DATABASES (one per service) ============
  auth_db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./db-init/auth-init.sql:/docker-entrypoint-initdb.d/auth-init.sql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  catalog_db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./db-init/catalog-init.sql:/docker-entrypoint-initdb.d/catalog-init.sql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  order_db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./db-init/order-init.sql:/docker-entrypoint-initdb.d/order-init.sql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============ APPLICATION SERVICES ============
  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"
    depends_on:
      - auth_db
    deploy:
      resources:
        limits:
          # Each service gets a slice - total roughly equivalent to monolith
          cpus: '0.17'
          memory: 86M

  catalog-service:
    build: ./catalog-service
    ports:
      - "5002:5002"
    depends_on:
      - catalog_db
    deploy:
      resources:
        limits:
          cpus: '0.17'
          memory: 86M

  order-service:
    build: ./order-service
    ports:
      - "5003:5003"
    depends_on:
      - order_db
      - auth-service
      - catalog-service
    deploy:
      resources:
        limits:
          cpus: '0.17'
          memory: 86M

cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
